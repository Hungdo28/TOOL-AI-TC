<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AI Automation Dashboard</title>
    <!-- Thêm font Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Thêm thư viện Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-slate-50 min-h-screen font-sans flex items-center justify-center p-4 relative selection:bg-blue-100 selection:text-blue-900">

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-blue-100/50 blur-[120px]"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-emerald-100/40 blur-[100px]"></div>
    </div>

    <div
        class="w-full max-w-md bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-xl border border-white/50 relative z-10">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-600/20 mb-5">
                <i data-lucide="flask-conical" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Đăng nhập hệ thống</h1>
            <p class="text-slate-500 text-sm mt-2 font-medium">Vui lòng đăng nhập để sử dụng Tool Kiểm thử AI</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <!-- Username Field -->
            <div class="mb-5">
                <label for="username" class="block text-sm font-bold text-slate-600 mb-2 tracking-wide">TÀI
                    KHOẢN</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user"
                            class="w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" id="username" required
                        class="group outline-none block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium"
                        placeholder="Tên đăng nhập (VD: hung)">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5 tracking-wide">Mật khẩu</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-3 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="password" required
                        class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="Nhập mật khẩu">
                </div>
            </div>

            <div id="errorMessage"
                class="hidden text-red-500 text-sm font-semibold text-center bg-red-50 py-2 rounded-lg border border-red-100">
                Sai tài khoản hoặc mật khẩu!
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md shadow-blue-600/20 flex items-center justify-center gap-2 mt-2">
                Đăng nhập
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

    </div>

    <!-- Gọi hàm khởi tạo icon Lucide -->
    <script>
        lucide.createIcons();
    </script>
    <!-- SCRIPT ĐĂNG NHẬP -->
    <script src="login.js?v=2"></script>
</body>

</html>
