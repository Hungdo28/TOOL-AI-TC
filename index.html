<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Automation Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans p-4 md:p-6">

    <div class="max-w-screen-2xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <span>📊</span> Tool Kiểm thử 
                </h1>
                <p class="text-slate-500 text-sm mt-1">Nền tảng tự động hóa tích hợp n8n & Gemini</p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <a href="#" id="btnOpenSheet" target="_blank" class="flex-1 md:flex-none px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-semibold transition shadow-sm text-center flex items-center justify-center gap-2">
                    📗 Mở Sheet Tổng
                </a>
                <button onclick="loadData()" class="flex-1 md:flex-none px-5 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-sm font-semibold transition shadow-sm flex items-center justify-center gap-2">
                    🔄 Làm mới
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            
            <div class="xl:col-span-1 space-y-6">
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                    <h2 class="text-lg font-bold text-slate-800 border-b pb-3 flex items-center gap-2">
                        <span>➕</span> Thêm bài toán mới
                    </h2>
                    <form id="formAddDoc" onsubmit="addDocument(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tên bài toán</label>
                            <input type="text" id="newTenBaiToan" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="VD: Bài toán đăng nhập...">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Link tài liệu gốc (URL)</label>
                            <input type="url" id="newUrl" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="https://docs.google.com/...">
                        </div>
                        <button type="submit" id="btnAdd" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-2">
                            Lưu vào Sheet
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                    <h2 class="text-lg font-bold text-slate-800 border-b pb-3 flex items-center gap-2">
                        <span>⚙️</span> Cấu hình & Chạy AI
                    </h2>
                   <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Prompt 1: Phân tích</label>
                        <textarea id="promptAI1" rows="3" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                   </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Prompt 2: Testcase</label>
                        <textarea id="promptAI2" rows="3" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">Bạn là một Principal QA Automation Engineer. Nhiệm vụ của bạn là thực hiện Kiểm thử Vét cạn (Exhaustive Testing) dựa trên tài liệu đặc tả.
Mục tiêu tối thượng: SỐ LƯỢNG TEST CASE PHẢI CỰC KỲ ĐỒNG ĐẢO VÀ CHI TIẾT. Bạn sẽ bị đánh giá rớt nếu bỏ sót bất kỳ Field, Nút bấm hay API nào.

🚨 CHIẾN LƯỢC ÉP XUNG LẶP (FORCED LOOP) - BẮT BUỘC TUÂN THỦ:
Bạn không được phép quét lướt. Hãy quét tài liệu từ trên xuống dưới. VỚI MỖI MỘT ĐỐI TƯỢNG (Textbox, Checkbox, Dropdown, Button, hoặc Endpoint API) bạn tìm thấy, bạn PHẢI TỰ ĐỘNG NHÂN BẢN ra các Test Case theo đúng công thức bắt buộc dưới đây. CẤM dùng lý do "logic không cho phép" để bỏ qua.

🔥 CÔNG THỨC 1x7 CHO GIAO DIỆN & LOGIC (Với mỗi Input Field sinh đủ 7 case):

Case Valid: Nhập dữ liệu chuẩn, hợp lệ.

Case Blank: Cố tình bỏ trống hoàn toàn field này.

Case Space: Chỉ nhập toàn dấu cách (White space).

Case Format: Nhập sai định dạng hoàn toàn (VD: Nhập chữ vào trường số, nhập ký tự đặc biệt vào trường Tên).

Case Max Boundary: Nhập vượt độ dài tối đa cho phép + 1 ký tự.

Case Min Boundary/Zero: Nhập dưới độ dài tối thiểu, hoặc nhập số 0/số âm (nếu là trường số).

Case XSS/SQLi: Cố tình chèn mã độc (<script>alert(1)</script>, ' OR 1=1 --).

📡 CÔNG THỨC 1x6 CHO API (BẮT BUỘC ĐỦ 6 MÃ STATUS CODE KHÁC NHAU):
Với MỖI Endpoint săn được, bạn PHẢI sinh ra đúng 6 Test Case tương ứng với 6 kịch bản độc lập (Bao gồm cả thành công và thất bại):
- Case 1 (Happy Path - Thành công): Gọi API với Token hợp lệ và Payload/Tham số chuẩn xác theo tài liệu. -> EXPECT BẮT BUỘC: HTTP 200 OK (hoặc 201 Created đối với API Tạo mới) và Database được cập nhật.
- Case 2 (Lỗi Authentication): Gọi API không truyền Token hoặc Token hỏng. -> EXPECT BẮT BUỘC: HTTP 401 Unauthorized.
- Case 3 (Lỗi Authorization): Gọi API với Token của User không có quyền hạn. -> EXPECT BẮT BUỘC: HTTP 403 Forbidden.
- Case 4 (Lỗi Method): Gọi API sai HTTP Method (VD: Tính năng cần POST nhưng gọi GET/PUT). -> EXPECT BẮT BUỘC: HTTP 405 Method Not Allowed (hoặc 404).
- Case 5 (Lỗi Validate Input): Gửi Request Body rỗng {} hoặc thiếu Param bắt buộc. -> EXPECT BẮT BUỘC: HTTP 400 Bad Request.
- Case 6 (Lỗi Logic/Server): Cố tình vi phạm logic nghiệp vụ (Ví dụ: chưa đủ 24h) hoặc ép server xử lý data dị biệt. -> EXPECT BẮT BUỘC: HTTP 500 Internal Server Error (hoặc mã lỗi nghiệp vụ riêng).
📜 TIÊU CHUẨN NỘI DUNG (TEST DATA & EXPECTED):

Summary: Mở đầu bằng động từ + Rõ kịch bản (VD: "Kiểm tra hệ thống báo lỗi khi bỏ trống trường [X]", "Kiểm tra API [Y] trả về 401 khi thiếu Token").

                    Steps: PHẢI CÓ DỮ LIỆU ĐÓNG GIẢ. Đừng viết "Nhập dữ liệu sai", hãy viết "Nhập SĐT: '090abc123' hoặc Gửi JSON: {"id": null}".

                    Expected: Chi tiết cả Frontend (Màu đỏ, disable nút, text thông báo) lẫn Backend (Status code, DB không lưu).

                    💻 ĐỊNH DẠNG ĐẦU RA (JSON STRICT MUDO):

                    CẤM Markdown (không dùng ```json). CẤM mở bài, kết bài.

                    CHỈ trả về đúng 1 Array JSON duy nhất chứa các Object theo cấu trúc sau. Đừng dừng lại cho đến khi hết tài liệu.
                    [
                    {
                    "suite": "Tên Chức năng / Tên Màn hình / Tên API",
                    "summary": "Tên test case (động từ đứng đầu)",
                    "steps": "1. ...\n2. ...",
                    "expected": "1. ...\n2. ..."
                    }
                    ]
</textarea>
                    </div>
                    <button id="runBtn" onclick="checkAndRunFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-blue-100">
                        🚀 Chạy xử lý AI
                    </button>
                </div>
            </div>

            <div class="xl:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col overflow-hidden">
                <h2 class="text-lg font-bold text-slate-800 border-b pb-3 mb-4 flex items-center gap-2">
                    <span>📋</span> Danh sách toàn bộ bài toán
                </h2>
                
                <div class="overflow-x-auto flex-grow">
                    <table class="min-w-full text-sm text-left text-slate-600 whitespace-nowrap">
                        <thead class="text-xs text-slate-700 uppercase bg-slate-50">
                            <tr>
                                <th class="px-4 py-3 font-bold">Bài toán</th>
                                <th class="px-4 py-3 font-bold">Trạng thái</th>
                                <th class="px-4 py-3 font-bold">URL Gốc</th>
                                <th class="px-4 py-3 font-bold">Link Testcase</th>
                                <th class="px-4 py-3 font-bold">Link Phân tích</th>
                                <th class="px-4 py-3 font-bold text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full flex flex-col items-center text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <h3 id="loadingText" class="text-lg font-bold text-slate-800">Đang xử lý...</h3>
        </div>
    </div>
        <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 transition-opacity">
                <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-md w-full border border-slate-100 transform transition-all scale-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-5 flex items-center gap-2 border-b pb-3">
                        <span>✏️</span> Cập nhật bài toán
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tên bài toán mới</label>
                            <input type="text" id="editTenBaiToan" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-2 flex justify-between items-center">
                                <span>Danh sách Link tài liệu gốc</span>
                                <button type="button" onclick="addNewLinkInput()" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-xs px-2 py-1 bg-blue-50 rounded-md transition">
                                    <span>➕</span> Thêm link
                                </button>
                            </label>
                            <div id="editUrlContainer" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                                </div>
                        </div>
                        <div class="flex justify-end gap-3 mt-6 pt-2">
                            <button onclick="closeEditModal()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-bold transition">Hủy bỏ</button>
                            <button id="btnSaveEdit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold transition shadow-md shadow-blue-100">Lưu thay đổi</button>
                        </div>
                    </div>
                </div>
            </div>
 <script>
        // ================= CẤU HÌNH API =================
        const URL_MASTER_SHEET = 'https://docs.google.com/spreadsheets/d/1oyWC0Z12SjiAVH8P023HjQtnHFprKFCQgmBCqqytZW0/edit?gid=0#gid=0'; 
        const URL_GET_LIST = 'https://hungdvtest.app.n8n.cloud/webhook/1981ca71-5359-43d7-94a4-aef5615653ea'; 
        const URL_POST_RUN = 'https://hungdvtest.app.n8n.cloud/webhook/4936b46e-27c3-4b6f-b9c2-11bb96d9e3af'; 
        const URL_POST_ADD = 'https://hungdvtest.app.n8n.cloud/webhook/7dea3b89-0dcf-4a98-b60b-191bdcb78e67'; 
        const URL_POST_EDIT = 'https://hungdvtest.app.n8n.cloud/webhook/sua-tai-lieu'; 
        const URL_POST_DELETE = 'https://hungdvtest.app.n8n.cloud/webhook/xoa-tai-lieu';

        document.getElementById('btnOpenSheet').href = URL_MASTER_SHEET;

        let dataRows = [];
        let pollingTimer = null; // Biến lưu trữ vòng lặp tự động kiểm tra

        const getColVal = (row, colName) => {
            const key = Object.keys(row).find(k => k.trim() === colName);
            return key && row[key] ? row[key] : '';
        };

        // 1. TẢI DỮ LIỆU
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            
            // Chỉ hiện chữ Đang tải nếu không phải đang chạy ngầm (để tránh chớp giật màn hình)
            if(!pollingTimer) tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 text-center text-slate-400">🔄 Đang tải dữ liệu...</td></tr>';
            
            try {
                const res = await fetch(URL_GET_LIST);
                if (!res.ok) throw new Error('Network error');
                dataRows = await res.json();
                tbody.innerHTML = '';

                if (!Array.isArray(dataRows) || dataRows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 text-center">Không có dữ liệu</td></tr>';
                    return;
                }

                dataRows.forEach((row,index) => {
                    const ten = getColVal(row, 'Bài toán') || '-';
                    const trangThai = getColVal(row, 'Trạng thái') || 'Chưa làm';
                    const urlGoc = getColVal(row, 'URL');
                    const linkTC = getColVal(row, 'Link Testcase');
                    const linkPT = getColVal(row, 'Link tài liệu phân tích');

                    // Nếu trạng thái là Waiting hoặc Chưa làm thì hiện màu vàng, xong thì màu xanh
                    let statusClass = 'bg-amber-100 text-amber-700';
                    if(trangThai === 'Đã xong') statusClass = 'bg-green-100 text-green-700';
                    if(trangThai === 'Waiting') statusClass = 'bg-blue-100 text-blue-700 animate-pulse'; // Thêm hiệu ứng nhấp nháy cho chữ Waiting

                    const makeLink = (linkStr) => {
                        if (!linkStr) return '<span class="text-slate-400 italic">Trống</span>';

                        // Tách các link ra thành mảng
                        const urls = linkStr.split(/[\n\s]+/).filter(url => url.trim().startsWith('http'));

                        if (urls.length === 0) {
                            return `<span class="break-all whitespace-normal text-slate-600">${linkStr}</span>`;
                        }

                        // Bọc toàn bộ các link trong một thẻ div có Flexbox và gap-2 để tạo khoảng cách
                        return `<div class="flex flex-col gap-2.5">` + urls.map((url) => {
                            const cleanUrl = url.trim();
                            
                            // Tự động nhận diện Icon dựa trên URL
                            let icon = '🔗';
                            if (cleanUrl.includes('figma.com')) icon = '🎨';
                            else if (cleanUrl.includes('spreadsheets')) icon = '📊';
                            else if (cleanUrl.includes('document')) icon = '📝';

                            // Trả về một khối (card) nhỏ cho từng link
                            return `
                            <a href="${cleanUrl}" target="_blank" 
                            class="flex items-start gap-2 p-2.5 rounded-lg bg-slate-50 border border-slate-200 hover:bg-blue-50 hover:border-blue-300 transition-all group">
                                <span class="text-sm shrink-0 mt-0.5">${icon}</span>
                                <span class="text-blue-600 group-hover:text-blue-800 text-xs break-all whitespace-normal leading-relaxed">
                                    ${cleanUrl}
                                </span>
                            </a>`;
                        }).join('') + `</div>`;
                    };

                    tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">
                        <td class="px-4 py-4 align-top font-semibold text-slate-800">${ten}</td>
                        <td class="px-4 py-4 align-top">
                            <span class="px-2.5 py-1 text-xs font-bold rounded-md ${statusClass}">${trangThai}</span>
                        </td>
                        <td class="px-4 py-4 align-top min-w-[200px]">${makeLink(urlGoc)}</td>
                        <td class="px-4 py-4 align-top min-w-[200px]">${makeLink(linkTC)}</td>
                        <td class="px-4 py-4 align-top min-w-[200px]">${makeLink(linkPT)}</td>
                        <td class="px-4 py-4 align-top min-w-[100px] text-center">
                            <div class="flex items-center justify-center gap-3 pt-1">
                                <button onclick="editDocument(${index})" class="text-blue-500 hover:text-blue-700 transition-colors" title="Sửa tên/link">✏️</button>
                                <button onclick="deleteDocument(${index})" class="text-red-500 hover:text-red-700 transition-colors" title="Xóa bài toán">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
                });
            } catch (err) {
                console.error(err);
                if(!pollingTimer) tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-10 text-center text-red-500">❌ Lỗi kết nối n8n.</td></tr>`;
            }
        }

        // 2. THÊM TÀI LIỆU MỚI
        async function addDocument(e) {
            e.preventDefault();
            const btnAdd = document.getElementById('btnAdd');
            btnAdd.innerText = 'Đang lưu...';
            btnAdd.disabled = true;

            const payload = {
                baiToan: document.getElementById('newTenBaiToan').value,
                urlGoc: document.getElementById('newUrl').value
            };

            try {
                const res = await fetch(URL_POST_ADD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    document.getElementById('formAddDoc').reset();
                    await loadData(); 
                    alert("✅ Đã thêm tài liệu thành công vào Sheet!");
                } else {
                    alert("❌ Lỗi n8n khi thêm dữ liệu.");
                }
            } catch (err) {
                alert("❌ Không thể kết nối tới Webhook thêm tài liệu.");
            } finally {
                btnAdd.innerText = 'Lưu vào Sheet';
                btnAdd.disabled = false;
            }
        }
        // HÀM XÓA TÀI LIỆU
                // HÀM XÓA TÀI LIỆU
        async function deleteDocument(index) {
            // Lấy dữ liệu từ mảng thông qua index
            const row = dataRows[index];
            const tenBaiToan = getColVal(row, 'Bài toán') || '';

            if (!confirm(`⚠️ Anh có chắc chắn muốn xóa bài toán: "${tenBaiToan}" không? Hành động này không thể hoàn tác!`)) return;

            document.getElementById('loadingText').innerText = 'Đang xóa...';
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                const res = await fetch(URL_POST_DELETE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ baiToan: tenBaiToan })
                });

                if (res.ok) {
                    await loadData();
                    alert("✅ Đã xóa thành công!");
                } else {
                    alert("❌ Lỗi từ n8n khi xóa dữ liệu.");
                }
            } catch (err) {
                alert("❌ Lỗi mạng: Không thể kết nối tới Webhook xóa.");
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        // ================= CÁC HÀM XỬ LÝ MODAL SỬA =================
        let currentEditOldName = ''; 
        let currentEditOldUrl = '';  

        // 1. Mở popup và tự động tạo các ô input riêng biệt cho từng link
        function editDocument(index) {
            const row = dataRows[index];
            currentEditOldName = getColVal(row, 'Bài toán') || '';
            currentEditOldUrl = getColVal(row, 'URL') || '';
            
            document.getElementById('editTenBaiToan').value = currentEditOldName;
            
            const urlContainer = document.getElementById('editUrlContainer');
            urlContainer.innerHTML = ''; 

            let urls = currentEditOldUrl.split(/[\n\s]+/).filter(url => url.trim().startsWith('http'));
            if (urls.length === 0) urls = ['']; 

            urls.forEach(url => {
                addNewLinkInput(url);
            });
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        // Hàm phụ: Tạo ra 1 ô input mới
        function addNewLinkInput(value = '') {
            const container = document.getElementById('editUrlContainer');
            const input = document.createElement('input');
            input.type = 'url';
            input.value = value;
            input.className = 'w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition url-input-item';
            input.placeholder = 'https://...';
            container.appendChild(input);
        }

        // 2. Đóng popup
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        // 3. Xử lý khi bấm nút "Lưu thay đổi" trong Modal
        document.getElementById('btnSaveEdit').onclick = async function() {
            const newTen = document.getElementById('editTenBaiToan').value.trim();
            
            // Gom tất cả link từ các ô input lại và nối bằng dấu xuống dòng
            const urlInputs = document.querySelectorAll('.url-input-item');
            const newUrlsArray = Array.from(urlInputs).map(input => input.value.trim()).filter(val => val !== '');
            const newUrl = newUrlsArray.join('\n');

            if (!newTen) {
                alert("❌ Vui lòng nhập tên bài toán!");
                return;
            }

            if (newTen === currentEditOldName && newUrl === currentEditOldUrl) {
                closeEditModal();
                return;
            }

            closeEditModal();
            document.getElementById('loadingText').innerText = 'Đang cập nhật...';
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                const res = await fetch(URL_POST_EDIT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        oldBaiToan: currentEditOldName, 
                        newBaiToan: newTen,        
                        newUrl: newUrl             
                    })
                });

                if (res.ok) {
                    await loadData(); 
                    alert("✅ Đã cập nhật thành công!");
                } else {
                    alert("❌ Lỗi từ n8n khi cập nhật dữ liệu.");
                }
            } catch (err) {
                alert("❌ Lỗi mạng: Không thể kết nối tới Webhook sửa.");
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        };

        // 3. CHẠY AI & TỰ ĐỘNG CẬP NHẬT
        async function checkAndRunFlow() {
            const unfinished = dataRows.filter(row => getColVal(row, 'Trạng thái') !== 'Đã xong');
            if (unfinished.length === 0) return alert("🎉 Tất cả các bài toán đều đã 'Đã xong'. Không có gì để chạy!");

            document.getElementById('loadingText').innerText = 'Đang đẩy lệnh sang n8n...';
            document.getElementById('loadingOverlay').classList.remove('hidden');

            const payload = {
                promptAI1: document.getElementById('promptAI1').value,
                promptAI2: document.getElementById('promptAI2').value
            };

            try {
                const res = await fetch(URL_POST_RUN, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('loadingOverlay').classList.add('hidden');

                if (res.ok) {
                    alert("🚀 ĐÃ GỬI LỆNH THÀNH CÔNG!\n\nHệ thống sẽ tự động cập nhật bảng này mỗi 15 giây.\nVui lòng không đóng trình duyệt để nhận thông báo khi hoàn thành!");
                    
                    // Khóa nút Chạy AI lại và đổi tên để người dùng biết đang chạy
                    const runBtn = document.getElementById('runBtn');
                    runBtn.innerHTML = '⏳ Đang phân tích ngầm...';
                    runBtn.disabled = true;
                    runBtn.classList.add('opacity-70', 'cursor-not-allowed');

                    // Thiết lập vòng lặp F5 ngầm mỗi 15 giây (15000 ms)
                    pollingTimer = setInterval(async () => {
                        await loadData(); // Tự động load lại bảng
                        
                        // Kiểm tra xem còn bài nào chưa xong không
                        const stillUnfinished = dataRows.filter(row => getColVal(row, 'Trạng thái') !== 'Đã xong');
                        
                        if (stillUnfinished.length === 0) {
                            // NẾU TẤT CẢ ĐÃ XONG -> Tắt vòng lặp, nhả nút bấm và hiện thông báo!
                            clearInterval(pollingTimer);
                            pollingTimer = null;
                            
                            runBtn.innerHTML = '🚀 Chạy xử lý AI';
                            runBtn.disabled = false;
                            runBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                            
                            alert("🎉 XUẤT SẮC! ĐÃ TẠO THÀNH CÔNG TOÀN BỘ TÀI LIỆU!");
                        }
                    }, 15000);

                } else {
                    alert("❌ Lỗi: n8n từ chối yêu cầu. Hãy kiểm tra lại cấu hình Webhook.");
                }
            } catch (err) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                alert("❌ Lỗi mạng: Không thể kết nối tới hệ thống n8n. Hãy kiểm tra CORS.");
            } 
        }

        window.onload = loadData;
    </script>
</body>
